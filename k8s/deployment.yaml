apiVersion: apps/v1
kind: Deployment
metadata:
  name: tesco-mlops-scoring
  namespace: mlops
  labels:
    app: tesco-mlops-scoring
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tesco-mlops-scoring
  template:
    metadata:
      labels:
        app: tesco-mlops-scoring
    spec:
      serviceAccountName: mlops-scoring-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: scoring
          image: tescomlopscr.azurecr.io/tesco-mlops-scoring:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: MODEL_NAME
              value: "tesco-customer-segmentation"
            - name: MODEL_STAGE
              value: "Production"
            # Bug fix #10: MLFLOW_TRACKING_URI env var pointing to Databricks workspace URL
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                secretKeyRef:
                  name: mlops-secrets
                  key: MLFLOW_TRACKING_URI
            - name: MLFLOW_TRACKING_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mlops-secrets
                  key: DATABRICKS_TOKEN
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
      imagePullSecrets:
        - name: acr-pull-secret
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tesco-mlops-scoring-hpa
  namespace: mlops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tesco-mlops-scoring
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
