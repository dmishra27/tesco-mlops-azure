# Bug fix #13: .github/workflows placed at repo root (not under ci/github/)
# Bug fix #11: kubectl apply -f k8s/service.yaml added to deploy job
# Bug fix #12: Databricks CLI job trigger step added

name: Tesco MLOps CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      run_training:
        description: "Trigger Databricks training job"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

env:
  ACR_NAME: tescomlopscr
  IMAGE_NAME: tesco-mlops-scoring
  AKS_CLUSTER: tesco-mlops-aks
  AKS_RESOURCE_GROUP: tesco-mlops-prod-rg
  K8S_NAMESPACE: mlops
  DATABRICKS_JOB_NAME: tesco-mlops-training-pipeline

jobs:
  # ── Lint & Test ─────────────────────────────────────────────────────────────
  test:
    name: Lint and Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r ml/requirements.txt ruff pytest pytest-asyncio anyio httpx

      - name: Lint (ruff)
        run: ruff check ml/ producer/

      - name: Run tests
        run: pytest tests/unit/ -v --tb=short
        continue-on-error: false

  # ── Build & Push Docker Image ────────────────────────────────────────────────
  build:
    name: Build and Push Container Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Generate image metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          echo "tags=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${SHORT_SHA},${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ml/
          file: ml/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

  # ── Model Quality Gate ───────────────────────────────────────────────────────
  # Runs after the container is built but BEFORE any deployment.
  # Pulls the latest Staging model from MLflow, validates metrics against the
  # same 6-gate thresholds used in ml/local/model_selection.py, and either
  # promotes the model to Production (all gates pass) or exits with code 1,
  # which blocks the deploy job entirely.  A degraded model can never reach AKS.
  model-gate:
    name: Model Quality Gate
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    outputs:
      gate_passed:   ${{ steps.gate.outputs.gate_passed }}
      model_version: ${{ steps.gate.outputs.model_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install MLflow
        run: pip install "mlflow[databricks]"

      - name: Run model quality gates
        id: gate
        env:
          MLFLOW_TRACKING_URI: databricks
          DATABRICKS_HOST:     ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN:    ${{ secrets.DATABRICKS_TOKEN }}
          REGISTERED_MODEL:    tesco-propensity
        run: python .github/scripts/model_gate.py

  # ── Deploy to AKS ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: model-gate          # blocked if model-gate fails or any gate exits 1
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AKS_RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER }} \
            --overwrite-existing

      - name: Create/update K8s secrets
        run: |
          kubectl create secret generic mlops-secrets \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --from-literal=MLFLOW_TRACKING_URI=${{ secrets.DATABRICKS_HOST }} \
            --from-literal=DATABRICKS_TOKEN=${{ secrets.DATABRICKS_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Update deployment image tag
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          kubectl set image deployment/tesco-mlops-scoring \
            scoring=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${SHORT_SHA} \
            --namespace ${{ env.K8S_NAMESPACE }}

      - name: Apply deployment manifest
        run: kubectl apply -f k8s/deployment.yaml --namespace ${{ env.K8S_NAMESPACE }}

      # Bug fix #11: kubectl apply -f k8s/service.yaml was missing from the original deploy job
      - name: Apply service manifest
        run: kubectl apply -f k8s/service.yaml --namespace ${{ env.K8S_NAMESPACE }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/tesco-mlops-scoring \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --timeout=300s

      - name: Smoke test /health endpoint
        run: |
          SVC_IP=$(kubectl get svc tesco-mlops-scoring \
            --namespace ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          curl --fail --retry 5 --retry-delay 10 "http://${SVC_IP}/health"

  # ── Trigger Databricks Training Job ─────────────────────────────────────────
  # Bug fix #12: Databricks CLI job trigger step was missing entirely from original
  trigger-training:
    name: Trigger Databricks Training Pipeline
    runs-on: ubuntu-latest
    needs: deploy
    if: >
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      (github.event.inputs.run_training == 'true' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Set up Databricks CLI
        run: pip install databricks-cli

      - name: Configure Databricks CLI
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks configure --token <<EOF
          ${DATABRICKS_HOST}
          ${DATABRICKS_TOKEN}
          EOF

      - name: Get training job ID
        id: get_job
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          JOB_ID=$(databricks jobs list --output json \
            | python3 -c "
          import sys, json
          jobs = json.load(sys.stdin).get('jobs', [])
          match = next((j['job_id'] for j in jobs if j['settings']['name'] == '${{ env.DATABRICKS_JOB_NAME }}'), None)
          print(match or '')
          ")
          if [ -z "$JOB_ID" ]; then
            echo "Training job '${{ env.DATABRICKS_JOB_NAME }}' not found in workspace"
            exit 1
          fi
          echo "job_id=${JOB_ID}" >> $GITHUB_OUTPUT

      - name: Trigger Databricks training job
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          RUN_ID=$(databricks jobs run-now \
            --job-id ${{ steps.get_job.outputs.job_id }} \
            --output json | python3 -c "import sys,json; print(json.load(sys.stdin)['run_id'])")
          echo "Databricks run triggered: run_id=${RUN_ID}"
          echo "Run URL: ${{ secrets.DATABRICKS_HOST }}/#job/${{ steps.get_job.outputs.job_id }}/run/${RUN_ID}"
